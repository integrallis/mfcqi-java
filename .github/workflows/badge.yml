name: Update MFCQI Badge

# Self-scores the project with its own CLI and commits the badge JSON consumed by the
# README's shields.io endpoint badge. Mirrors the Python sibling's mfcqi-badge.yml.
#
# The score is computed over the PUBLISHED LIBRARY production sources only (the ten
# library modules' src/main/java, excluding the CLI module and all test code) — the
# apples-to-apples analog of the Python badge, which scores src/mfcqi (production only).

on:
  push:
    branches: [main]
    paths:
      - '**/src/main/java/**'
      - '**/build.gradle.kts'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Build the CLI
        run: ./gradlew :mfcqi-cli:installDist --no-daemon

      - name: Stage published-library production sources
        run: |
          STAGE="$(mktemp -d)"
          for d in */src/main/java; do
            case "$d" in mfcqi-cli/*) continue;; esac
            cp -r "$d/." "$STAGE/"
          done
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Generate badge JSON
        run: |
          mkdir -p .github/badges
          ./mfcqi-cli/build/install/mfcqi/bin/mfcqi badge "$STAGE" -f json -o .github/badges/mfcqi.json
          cat .github/badges/mfcqi.json

      - name: Commit badge update
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/badges/mfcqi.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update MFCQI badge [skip ci]"
            git push
          fi
