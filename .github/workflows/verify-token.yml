name: Verify PACKAGES_PUBLISH_TOKEN
# Throwaway: checks whether PACKAGES_PUBLISH_TOKEN can dispatch workflows (Actions: write).
# It tries to dispatch badge.yml using that token. Safe to delete after verifying.
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Attempt a dispatch with PACKAGES_PUBLISH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PUBLISH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::PACKAGES_PUBLISH_TOKEN is not set."
            exit 1
          fi
          if gh workflow run badge.yml --repo "${{ github.repository }}"; then
            echo "::notice::OK — PACKAGES_PUBLISH_TOKEN can dispatch workflows (Actions: write present)."
          else
            echo "::error::PACKAGES_PUBLISH_TOKEN cannot dispatch (missing Actions: write on this repo)."
            exit 1
          fi
