name: Release

# Triggered MANUALLY from the GitHub Actions web UI:
#   Actions tab -> "Release" -> "Run workflow".
#
#   * Leave "dry_run" CHECKED (the default) to validate the entire pipeline — signing, POM/Maven
#     Central rules, and bundle assembly — WITHOUT uploading anything or creating a release.
#   * UNCHECK "dry_run" to actually deploy the libraries to Maven Central (JReleaser) and then
#     create the GitHub Release with the CLI distribution (gh, tagging the current commit as
#     v<version>).
#
# Maven Central deploy and the GitHub release are intentionally DECOUPLED: JReleaser only deploys,
# and `gh` creates the release. (In JReleaser, `release` also runs the deploy phase, which collides
# with an already-published deployment.) If the release step ever needs re-running, set
# "skip_deploy" so it recreates only the GitHub release without re-deploying to Central.
#
# Required repository secrets:
#   MAVENCENTRAL_USERNAME / MAVENCENTRAL_PASSWORD  - Central Portal user token
#   GPG_PUBLIC_KEY / GPG_SECRET_KEY / GPG_PASSPHRASE - armored GPG keypair + passphrase
# (GITHUB_TOKEN is provided automatically.)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate only — no Maven Central upload, no GitHub release)"
        type: boolean
        default: true
      skip_deploy:
        description: "Skip the Maven Central deploy (use to (re)create only the GitHub release when the deploy already succeeded)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Release to Maven Central + GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so JReleaser can build the changelog

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Build, test, and stage artifacts
        run: >
          ./gradlew build publish
          :mfcqi-cli:distZip :mfcqi-cli:distTar
          --no-daemon --stacktrace

      - name: Resolve project version
        id: version
        run: echo "version=$(grep -E '^version' gradle.properties | sed -E 's/.*=[[:space:]]*//')" >> "$GITHUB_OUTPUT"

      # ---------- DRY RUN: validate signing + POM rules + bundle, NO upload ----------
      - name: JReleaser deploy (dry-run)
        if: ${{ inputs.dry_run }}
        uses: jreleaser/release-action@v2
        with:
          arguments: deploy --dry-run
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.version }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # ---------- REAL RELEASE step 1: deploy to Maven Central (JReleaser) ----------
      - name: Deploy to Maven Central
        if: ${{ !inputs.dry_run && !inputs.skip_deploy }}
        uses: jreleaser/release-action@v2
        with:
          arguments: deploy
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.version }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # ---------- REAL RELEASE step 2: GitHub release with CLI distribution (gh) ----------
      # Decoupled from the Maven deploy on purpose, and idempotent: creating tags + the release if
      # absent, or just refreshing the attached archives if the release already exists. Re-running
      # with skip_deploy=true recreates the release without touching Maven Central.
      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          ZIP="mfcqi-cli/build/distributions/mfcqi-$VERSION.zip"
          TAR="mfcqi-cli/build/distributions/mfcqi-$VERSION.tar"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — refreshing assets."
            gh release upload "$TAG" "$ZIP" "$TAR" --clobber
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "mfcqi-java $VERSION" \
              --generate-notes \
              "$ZIP" "$TAR"
          fi

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-logs
          if-no-files-found: ignore
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
